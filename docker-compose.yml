name: news-rag

services:
  kafka-1:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka-1
    container_name: kafka-1
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:9092,CONTROLLER://kafka-1:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2GD'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka-1:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks: 
      - news-rag-net

  kafka-2:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka-2
    container_name: kafka-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:9092,CONTROLLER://kafka-2:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2GD'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka-2:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks: 
      - news-rag-net

  kafka-3:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka-3
    container_name: kafka-3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:9092,CONTROLLER://kafka-3:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2GD'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka-3:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks: 
      - news-rag-net
      
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka-1:
        condition: service_healthy
      # kafka-2:
      #   condition: service_healthy
      # kafka-3:
      #   condition: service_healthy
    # entrypoint: ["/bin/bash", "-c"]
    command:
      - /bin/bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic news.dlq --partitions 3 --replication-factor 3
        kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic news.raw --partitions 12 --replication-factor 3
        kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic news.embedded --partitions 12 --replication-factor 3
        echo '✅ Topics created'
    networks: 
      - news-rag-net
    # entrypoint: ["/bin/bash","-c"]
    # command: |
    #   kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic ip-geo-e --partitions 4 --replication-factor 1
    #   kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic news_dlq --partitions 3 --replication-factor 3
    #   kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic news_raw --partitions 12 --replication-factor 3
    #   kafka-topics --bootstrap-server kafka-1:9092 --create --if-not-exists --topic news_embedded --partitions 12 --replication-factor 3 
    #   echo '✅ Topics created'

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    # networks: [news-rag-net]
    ports:
      - "8118:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_CLUSTERS_0_NAME: local
    networks: 
      - news-rag-net

  scraper:
    build:
      context: .
      dockerfile: infra/scrapers/Dockerfile
    container_name: scraper
    env_file: .env
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    restart: on-failure
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    networks: 
      - news-rag-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry
    depends_on: [kafka-1]
    ports: ["8081:8081"]
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:9092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC: _schemas
    networks: 
      - news-rag-net


  flink-jobmanager:
    build:
      context: .
      dockerfile: infra/flink/Dockerfile
    container_name: flink-jobmanager
    ports: ["8083:8081"]
    command: jobmanager
    env_file: .env
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      PYTHONPATH: /opt/flink-job
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      FLINK_PROPERTIES: |
        jobmanager.memory.process.size: 2048m
        state.backend: rocksdb
        state.checkpoints.dir: file:///flink-checkpoints
        state.savepoints.dir: file:///flink-savepoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        restart-strategy: exponential-delay
        restart-strategy.exponential-delay.initial-backoff: 10s
        restart-strategy.exponential-delay.max-backoff: 5min
        restart-strategy.exponential-delay.reset-backoff-threshold: 1h
    volumes:
      - ./src:/opt/flink-job/src:ro
      - ./.env:/opt/flink-job/.env:ro
      - flink-checkpoints:/flink-checkpoints
      - flink-savepoints:/flink-savepoints
    networks: 
      - news-rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 15s
      timeout: 5s
      retries: 10

  flink-taskmanager:
    build:
      context: .
      dockerfile: infra/flink/Dockerfile
    #container_name: flink-taskmanager
    command: taskmanager
    depends_on: [flink-jobmanager]
    env_file: .env
    environment:
      JOB_MANAGER_RPC_ADDRESS: flink-jobmanager
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: 2
      PYTHONPATH: /opt/flink-job
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      FLINK_PROPERTIES: |
        taskmanager.memory.process.size: 4096m
        state.backend: rocksdb
        state.checkpoints.dir: file:///flink-checkpoints
        execution.checkpointing.interval: 60000
        execution.checkpointing.mode: EXACTLY_ONCE
        restart-strategy: exponential-delay
    volumes:
      - ./src:/opt/flink-job/src:ro
      - ./.env:/opt/flink-job/.env:ro
      - flink-checkpoints:/flink-checkpoints
    deploy:
      replicas: 1
    networks: 
      - news-rag-net

  flink-job:
    build:
      context: .
      dockerfile: infra/flink-job/Dockerfile
    container_name: flink-job
    env_file: .env
    environment:
      - PYTHONPATH=/opt/flink-job
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
    depends_on:
      flink-jobmanager:
        condition: service_healthy
      scraper:
        condition: service_started
    volumes:
      - ./src:/opt/flink-job/src
      - ./.env:/opt/flink-job/.env:ro
    networks: 
      - news-rag-net
    working_dir: /opt/flink-job
    command:
      - /bin/bash
      - -c
      - |
        sleep 25
        echo '▶ Submitting PyFlink sessionization job...'
        /opt/flink/bin/flink run -m flink-jobmanager:8081 -py /opt/flink-job/src/pipeline/flink_job.py -p 4
    #     flink run -m flink-jobmanager:8081 -py /opt/flink-job/flink_job.py -c src.pipeline.flink_job:main -p 4

  qdrant:
    image: qdrant/qdrant:v1.10.1
    ports: ["6333:6333","6334:6334"]
    container_name: qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
      - qdrant-data:/qdrant/storage
    networks: 
      - news-rag-net

  rag-api:
    build:
      context: .
      dockerfile: infra/rag/Dockerfile
    ports: ["8000:8000"]
    container_name: rag-api
    env_file: .env
    depends_on: [qdrant, kafka-1]
    networks: 
      - news-rag-net

  # Local LLM via llama.cpp server (OpenAI-compatible API at /v1).
  # This service is opt-in: it only starts with `docker compose --profile llm up`.
  # Without it, set LLM_PROVIDER=stub (or openai with a real OPENAI_API_KEY) and
  # rag-api will still work; rag-api will just not depend on llama-server being up.
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-server
    profiles: ["llm"]
    ports: ["8080:8080"]
    command:
      - --model
      - /models/gemma-4-12b-it-UD-Q4_K_XL.gguf
      - --host
      - "0.0.0.0"
      - --verbose
      - --metrics
      - --port
      - "8080"
    volumes:
      # Adjust this path to wherever your GGUF models are stored on the host.
      - /home/test/Documents/agents/models:/models:ro
    restart: unless-stopped
    networks:
      - news-rag-net

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: 
      - news-rag-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks: 
      - news-rag-net

networks:
  news-rag-net:
    driver: bridge

volumes:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:
  flink-checkpoints:
  flink-savepoints:
  qdrant-data:
