global:
  scrape_interval: 15s
scrape_configs:
  - job_name: flink
    metrics_path: /
    static_configs:
      - targets: ["flink-jobmanager:8081"]
  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
  - job_name: rag-api
    static_configs:
      - targets: ["rag-api:8000"]
